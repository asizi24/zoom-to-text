<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>כניסה — Zoom to Text</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    input[type="email"] {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      text-align: right;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="email"]:focus { border-color: #6c63ff; }
    input[type="email"]::placeholder { color: rgba(255,255,255,0.3); }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .message {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.9rem;
      display: none;
    }

    .message.success {
      background: rgba(74,222,128,0.15);
      border: 1px solid rgba(74,222,128,0.3);
      color: #4ade80;
      display: block;
    }

    .message.error {
      background: rgba(248,113,113,0.15);
      border: 1px solid rgba(248,113,113,0.3);
      color: #f87171;
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎙️ Zoom to Text</h1>
    <p class="subtitle">תמלול וסיכום הרצאות בינה מלאכותית</p>

    <form id="loginForm">
      <input
        type="email"
        id="emailInput"
        placeholder="כתובת המייל שלך"
        required
        autocomplete="email"
      />
      <button type="submit" id="submitBtn">שלח קישור כניסה</button>
    </form>

    <div id="message" class="message"></div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('emailInput').value.trim();
      if (!email) return;

      btn.disabled = true;
      btn.textContent = 'שולח...';
      msg.className = 'message';
      msg.textContent = '';

      try {
        const resp = await fetch('/api/auth/request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await resp.json();
        msg.className = 'message success';
        msg.textContent = data.message;
        form.reset();
      } catch {
        msg.className = 'message error';
        msg.textContent = 'אירעה שגיאה. נסה שוב.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'שלח קישור כניסה';
      }
    });
  </script>
</body>
</html>
