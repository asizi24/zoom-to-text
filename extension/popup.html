<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>Zoom Transcriber</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px; min-height: 280px;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #4F46E5 0%, #EC4899 100%);
      color: #fff; padding: 20px;
    }
    h1 { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    .sub { font-size: .78rem; opacity: .8; margin-bottom: 18px; }

    .status {
      background: rgba(255,255,255,.15); backdrop-filter: blur(6px);
      border-radius: 10px; padding: 12px 14px;
      font-size: .88rem; margin-bottom: 14px; min-height: 42px;
      display: flex; align-items: center;
    }
    .status-ok    { border-right: 3px solid #10B981; }
    .status-warn  { border-right: 3px solid #F59E0B; }
    .status-error { border-right: 3px solid #EF4444; }
    .status-info  { border-right: 3px solid #60A5FA; }

    .btn {
      width: 100%; padding: 13px; border: none; border-radius: 10px;
      font-size: .95rem; font-weight: 700; cursor: pointer;
      background: #10B981; color: white; transition: all .2s;
      margin-bottom: 10px;
    }
    .btn:hover:not(:disabled) { background: #059669; transform: translateY(-1px); }
    .btn:disabled { background: rgba(255,255,255,.25); cursor: not-allowed; transform: none; }

    /* Progress */
    #progress-wrap { display: none; margin-bottom: 12px; }
    .prog-bar-bg { height: 8px; background: rgba(255,255,255,.25); border-radius: 99px; overflow: hidden; }
    .prog-bar-fill {
      height: 100%; width: 0; border-radius: 99px;
      background: #10B981; transition: width .5s ease;
    }
    #progress-text { font-size: .78rem; opacity: .85; margin-top: 5px; text-align: left; }

    /* Result link */
    #result-link {
      display: none; width: 100%; padding: 11px; border-radius: 10px;
      background: white; color: #4F46E5; text-align: center;
      font-weight: 700; font-size: .9rem; text-decoration: none;
      margin-bottom: 10px; border: none;
    }

    /* Settings */
    .settings-toggle {
      font-size: .78rem; opacity: .75; cursor: pointer;
      text-decoration: underline; text-align: center;
      display: block; margin-top: 4px;
    }
    #settings-panel {
      display: none; margin-top: 12px;
      background: rgba(255,255,255,.12); border-radius: 10px; padding: 14px;
    }
    #settings-panel label { font-size: .78rem; opacity: .85; display: block; margin-bottom: 5px; }
    #server-url {
      width: 100%; padding: 8px 10px; border-radius: 8px;
      border: none; font-size: .82rem; margin-bottom: 8px;
      direction: ltr; text-align: left;
    }
    #save-settings {
      padding: 7px 16px; background: white; color: #4F46E5;
      border: none; border-radius: 8px; cursor: pointer;
      font-weight: 600; font-size: .82rem;
    }
  </style>
</head>
<body>
  <h1>🎓 Zoom Transcriber</h1>
  <p class="sub">שלח הקלטה לסיכום ומבחן אמריקאי</p>

  <div id="status" class="status status-info">בודק דף...</div>

  <button id="send-btn" class="btn" disabled>📤 שלח לעיבוד AI</button>

  <div id="progress-wrap">
    <div class="prog-bar-bg"><div class="prog-bar-fill" id="progress-fill"></div></div>
    <div id="progress-text">0%</div>
  </div>

  <a id="result-link" href="#" target="_blank">🔗 צפה בתוצאות</a>

  <span class="settings-toggle" id="settings-link">⚙️ הגדרות שרת</span>
  <div id="settings-panel">
    <label>כתובת השרת:</label>
    <input type="text" id="server-url" value="http://localhost:8000" />
    <button id="save-settings">שמור</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
