# Fly.io deployment configuration for Zoom to Text
app = "zoom-to-text"
primary_region = "ams"

[build]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 10
    soft_limit = 8

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[env]
  DATA_DIR = "/data"

[[mounts]]
  source = "zoom_data"
  destination = "/data"
